<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RTMD — Real Time Motion Detection</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; color:#d0d0e8; font-family:'Courier New',monospace; height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 24px; background:#0d0d18; border-bottom:1px solid #1a1a35; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:0.95rem; letter-spacing:3px; color:#00e5ff; text-transform:uppercase; }
  #status-pill { font-size:0.7rem; padding:4px 12px; border-radius:99px; background:#1a1a35; color:#556; letter-spacing:2px; transition:all 0.3s; }
  #status-pill.active { background:#0d2a0d; color:#00ff9d; }
  #status-pill.error  { background:#2a0d0d; color:#ff4444; }
  main { flex:1; display:flex; gap:14px; padding:14px; overflow:hidden; }
  #feed-panel { flex:3; position:relative; background:#05050d; border:1px solid #1a1a35; border-radius:10px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #webcam { display:none; }
  #canvas { width:100%; height:100%; object-fit:contain; display:block; }
  #overlay-msg { position:absolute; text-align:center; color:#334; font-size:0.85rem; letter-spacing:2px; pointer-events:none; }
  #fps-counter { font-size:0.65rem; color:#334; position:absolute; bottom:8px; right:10px; }
  #motion-flash { position:absolute; inset:0; border-radius:10px; border:3px solid transparent; pointer-events:none; transition:border-color 0.15s; }
  #motion-flash.active { border-color:#ff440099; }
  #sidebar { flex:1; display:flex; flex-direction:column; gap:10px; min-width:230px; max-width:260px; overflow-y:auto; }
  .panel { background:#0d0d18; border:1px solid #1a1a35; border-radius:10px; padding:12px; }
  .panel h2 { font-size:0.62rem; letter-spacing:3px; color:#445580; text-transform:uppercase; margin-bottom:10px; }
  #btn-start, #btn-stop { width:100%; padding:9px; border:none; border-radius:6px; font-family:inherit; font-size:0.78rem; letter-spacing:2px; cursor:pointer; text-transform:uppercase; transition:opacity 0.2s; }
  #btn-start { background:linear-gradient(135deg,#00e5ff,#00ff9d); color:#000; margin-bottom:6px; }
  #btn-stop  { background:#1a1a35; color:#556; }
  #btn-stop.live { color:#ff4444; border:1px solid #ff444433; }
  label { font-size:0.68rem; color:#445580; letter-spacing:1px; display:block; margin:8px 0 3px; }
  input[type=range] { width:100%; accent-color:#00e5ff; }
  #interval-val { float:right; color:#00e5ff; }
  #persons-list { display:flex; flex-direction:column; gap:6px; max-height:320px; overflow-y:auto; }
  .person-card { background:#10102a; border-radius:7px; padding:8px 10px; border-left:3px solid #00e5ff44; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 4px; }
  .person-card.moving { border-left-color:#ff440088; }
  .person-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; height: 1.2rem;}
  .person-name { font-size:0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .person-dur  { font-size:0.65rem; color:#445580; }
  .action-badge { display: inline-block; padding: 2px 12px; border-radius: 99px; font-size: 0.64 rem; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; min-width: 90px; text-align: center; transition: background-color 0.1s ease, color 0.1s ease; }
  .action-standing   { background:#0d2a1a; color:#00ff9d; }
  .action-sitting    { background:#1a1a2a; color:#7799ff; }
  .action-walking    { background:#2a1a0d; color:#ffaa00; }
  .action-sleeping   { background:#1a0d2a; color:#cc88ff; }
  .action-using-phone{ background:#2a0d0d; color:#ff4444; }
  .action-detecting  { background:#111; color:#445580; }
  .action-other      { background:#111; color:#667788; }
  .conf-bar-wrap { background:#1a1a35; border-radius:99px; height:3px; margin-top:6px; }
  .conf-bar { height:3px; border-radius:99px; background:#00e5ff; transition:width 0.4s; }
  .motion-tag { font-size:0.6rem; color:#ff6600; margin-top:4px; }
  #motion-list { max-height:110px; overflow-y:auto; scrollbar-width: thin; }
  .motion-row { font-size:0.67rem; padding:5px 0; border-bottom:1px solid #1a1a2a; color:#667; animation: fadeIn 0.3s ease-out; }
  .motion-row:last-child { border:none; }
  .motion-row span { color:#ff7700; font-weight: bold; text-shadow: 0 0 5px rgba(255, 119, 0, 0.3); }
  @keyframes fadeIn {
    from {opacity: 0; transform: translateX(-5px);}
    to {opacity: 1; transform: translateX(0);}
    
  }
  .stat-row { display:flex; justify-content:space-between; font-size:0.7rem; padding:3px 0; border-bottom:1px solid #1a1a2a; }
  .stat-row:last-child { border:none; }
  .stat-label { color:#445580; }
  .stat-val   { color:#00e5ff; }
</style>
</head>
<body>
<header>
  <h1>⬡ RTMD — Real-Time Motion Detection</h1>
  <span id="status-pill">OFFLINE</span>
</header>
<main>
  <div id="feed-panel">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="motion-flash"></div>
    <div id="overlay-msg">Press START to activate webcam</div>
    <span id="fps-counter"></span>
  </div>
  <div id="sidebar">
    <div class="panel">
      <h2>Controls</h2>
      <button id="btn-start" onclick="startDetection()">Start</button>
      <button id="btn-stop"  onclick="stopDetection()">Stop</button>
      <label>Send interval <span id="interval-val">200ms</span></label>
      <input type="range" id="interval" min="100" max="1000" step="50" value="200"
             oninput="document.getElementById('interval-val').textContent=this.value+'ms'">
    </div>
    <div class="panel">
      <h2>Persons</h2>
      <div id="persons-list"><div style="color:#334;font-size:0.72rem">No persons detected</div></div>
    </div>
    <div class="panel">
      <h2>Motion Regions</h2>
      <div id="motion-list"><div style="color:#334;font-size:0.72rem">No motion</div></div>
    </div>
    <div class="panel">
      <h2>Session Stats</h2>
      <div class="stat-row"><span class="stat-label">Frames sent</span><span class="stat-val" id="stat-frames">0</span></div>
      <div class="stat-row"><span class="stat-label">Persons</span><span class="stat-val" id="stat-persons">0</span></div>
      <div class="stat-row"><span class="stat-label">Motion</span><span class="stat-val" id="stat-motion">—</span></div>
      <div class="stat-row"><span class="stat-label">Session</span><span class="stat-val" id="stat-elapsed">0s</span></div>
    </div>
  </div>
</main>
<script>
const BONES = [[0,1],[0,2],[1,3],[2,4],[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
const ACTION_COLORS = {'standing':'#00ff9d','sitting':'#7799ff','walking':'#ffaa00','sleeping':'#cc88ff','using phone':'#ff4444','detecting...':'#445580','other':'#667788'};
const PERSON_COLORS = ['#00e5ff','#ff6b35','#a8ff3e','#ff3ea8','#ffdd00','#3ea8ff'];
let stream=null,running=false,frameCount=0,lastFpsTime=performance.now(),fpsFrames=0;
let latestData={persons:[],motion_regions:[],motion_detected:false};
const webcam=document.getElementById('webcam'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const overlayMsg=document.getElementById('overlay-msg'),statusPill=document.getElementById('status-pill'),motionFlash=document.getElementById('motion-flash');

async function startDetection(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720}});
    webcam.srcObject=stream; await webcam.play();
    canvas.width=webcam.videoWidth||1280; canvas.height=webcam.videoHeight||720;
    overlayMsg.style.display='none';
    await fetch('/analyze/reset',{method:'POST'});
    running=true; statusPill.textContent='LIVE'; statusPill.className='active';
    document.getElementById('btn-stop').classList.add('live');
    sendLoop(); renderLoop();
  }catch(e){ statusPill.textContent='CAM ERROR'; statusPill.className='error'; }
}
function stopDetection(){
  running=false;
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  overlayMsg.textContent='Press START to activate webcam'; overlayMsg.style.display='block';
  statusPill.textContent='OFFLINE'; statusPill.className='';
  document.getElementById('btn-stop').classList.remove('live');
}
function renderLoop(){
  if(!running)return;
  ctx.drawImage(webcam,0,0,canvas.width,canvas.height);
  drawOverlays(latestData);
  requestAnimationFrame(renderLoop);
}
async function sendLoop(){
  if(!running)return;
  const interval=parseInt(document.getElementById('interval').value);
  try{
    const off=new OffscreenCanvas(canvas.width,canvas.height);
    off.getContext('2d').drawImage(webcam,0,0);
    const blob=await off.convertToBlob({type:'image/jpeg',quality:0.8});
    const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.readAsDataURL(blob);});
    const resp=await fetch('/analyze/frame',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});
    if(resp.ok){const d=await resp.json();latestData=d;updateSidebar(d);}
  }catch(e){}
  frameCount++; fpsFrames++;
  const now=performance.now();
  if(now-lastFpsTime>1000){document.getElementById('fps-counter').textContent=fpsFrames+' fps';fpsFrames=0;lastFpsTime=now;}
  document.getElementById('stat-frames').textContent=frameCount;
  setTimeout(sendLoop,interval);
}
function drawOverlays(data){
  const persons=data.persons||[], regions=data.motion_regions||[];
  regions.forEach(r=>{
    ctx.save(); ctx.setLineDash([5,4]); ctx.strokeStyle='rgba(255,100,0,0.65)'; ctx.lineWidth=1.5;
    ctx.strokeRect(r.x,r.y,r.w,r.h); ctx.restore();
  });
  persons.forEach((p,i)=>{
    if(!p.bbox||p.bbox.length<4)return;
    const[x1,y1,x2,y2]=p.bbox;
    const color=PERSON_COLORS[i%PERSON_COLORS.length];
    const action=(p.action||'detecting...').toLowerCase();
    const aColor=ACTION_COLORS[action]||'#aabbcc';
    ctx.strokeStyle=p.motion?'#ff6600':color; ctx.lineWidth=2;
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    const kps=p.keypoints||[];
    if(kps.length===17){
      BONES.forEach(([a,b])=>{
        if(kps[a]&&kps[b]){ctx.beginPath();ctx.moveTo(kps[a][0],kps[a][1]);ctx.lineTo(kps[b][0],kps[b][1]);ctx.strokeStyle=color+'99';ctx.lineWidth=2;ctx.stroke();}
      });
      kps.forEach(([kx,ky])=>{ctx.beginPath();ctx.arc(kx,ky,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
    }
    const name=p.name||('Person '+p.track_id);
    const dur=p.duration?p.duration.toFixed(1)+'s':'';
    const full=`${name} · ${action}${p.motion?' ⚡':''}  ${dur}`;
    ctx.font='bold 12px Courier New';
    const tw=ctx.measureText(full).width+10;
    const ty=Math.max(y1-22,4);
    ctx.fillStyle='rgba(8,8,18,0.82)'; ctx.fillRect(x1,ty,tw,20);
    ctx.fillStyle=aColor; ctx.fillText(full,x1+5,ty+14);
    const cw=(p.confidence||0)*(x2-x1);
    ctx.fillStyle=aColor+'44'; ctx.fillRect(x1,y1,cw,3);
  });
  motionFlash.classList.toggle('active',data.motion_detected===true);
}
function updateSidebar(data){
  const persons=data.persons||[], regions=data.motion_regions||[];
  const pList=document.getElementById('persons-list');
  pList.innerHTML=persons.length===0?'<div style="color:#334;font-size:0.72rem">No persons detected</div>':
    persons.map((p,i)=>{
      const action=(p.action||'detecting...').toLowerCase();
      const cls=action.replace(/ /g,'-').replace(/\./g,'');
      const conf=Math.round((p.confidence||0)*100);
      const color=PERSON_COLORS[i%PERSON_COLORS.length];
      return `<div class="person-card ${p.motion?'moving':''}">
        <div class="person-header">
          <span class="person-name" style="color:${color}">${p.name||'Person '+p.track_id}</span>
          <span class="person-dur">${p.duration?p.duration.toFixed(1)+'s':''}</span>
        </div>
        <span class="action-badge action-${cls}">${action}</span>
        ${p.motion?'<div class="motion-tag">⚡ moving</div>':''}
        <div class="conf-bar-wrap"><div class="conf-bar" style="width:${conf}%"></div></div>
      </div>`;
    }).join('');
  const mList=document.getElementById('motion-list');
  mList.innerHTML=regions.length===0?'<div style="color:#334;font-size:0.72rem">No motion</div>':
    regions.map(r=>`<div class="motion-row">area <span>${r.area}</span>px² @ <span>(${r.cx},${r.cy})</span>${r.person_id!=null?' → Person <span>'+r.person_id+'</span>':''}</div>`).join('');
  document.getElementById('stat-persons').textContent=persons.length;
  document.getElementById('stat-motion').textContent=data.motion_detected?'⚡ YES':'none';
  document.getElementById('stat-elapsed').textContent=(data.session_elapsed||0)+'s';
}
</script>
</body>
</html>
